<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图形化 MUD 游戏原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            color: #4cc9f0;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }
        
        .subtitle {
            color: #a9a9a9;
            font-size: 1.1em;
        }
        
        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .game-container {
            flex: 3;
            min-width: 300px;
        }
        
        .chat-container {
            flex: 2;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        
        .game-canvas-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        
        #gameCanvas {
            width: 100%;
            height: 500px;
            background: #0d1b2a;
            border-radius: 5px;
            display: block;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        input, button {
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
        }
        
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        input:focus {
            outline: none;
            border-color: #4cc9f0;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.3);
        }
        
        button {
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        button:hover {
            background: linear-gradient(135deg, #3a56d4 0%, #2d0a8a 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .chat-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            overflow-y: auto;
            max-height: 400px;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #4cc9f0;
        }
        
        .message.system {
            border-left-color: #f72585;
            background: rgba(247, 37, 133, 0.1);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #a9a9a9;
        }
        
        .player-name {
            color: #4cc9f0;
            font-weight: bold;
        }
        
        .message-time {
            color: #888;
        }
        
        .message-text {
            color: #fff;
            line-height: 1.4;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .player-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f72585;
        }
        
        .status-dot.connected {
            background: #4cc9f0;
            box-shadow: 0 0 10px #4cc9f0;
        }
        
        .instructions {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .instructions h3 {
            color: #4cc9f0;
            margin-bottom: 10px;
        }
        
        .instructions ul {
            list-style: none;
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 8px;
            color: #ccc;
        }
        
        .instructions li:before {
            content: "•";
            color: #4cc9f0;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }
        
        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
            }
            
            .game-container, .chat-container {
                width: 100%;
            }
            
            #gameCanvas {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 图形化 MUD 游戏原型</h1>
            <p class="subtitle">基于备忘录技术栈验证：WebSocket + 2D 渲染 + 实时聊天</p>
        </header>
        
        <div class="game-area">
            <div class="game-container">
                <div class="game-canvas-container">
                    <canvas id="gameCanvas" width="800" height="600"></canvas>
                </div>
                
                <div class="controls">
                    <input type="text" id="playerName" placeholder="输入你的游戏昵称" value="冒险者">
                    <button id="joinButton">加入游戏</button>
                    <button id="moveButtons" style="display: none;">
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                            <button class="move-btn" data-dx="0" data-dy="-10">↑</button>
                            <button class="move-btn" data-dx="-10" data-dy="0">←</button>
                            <button class="move-btn" data-dx="0" data-dy="0">○</button>
                            <button class="move-btn" data-dx="10" data-dy="0">→</button>
                            <button class="move-btn" data-dx="0" data-dy="10">↓</button>
                        </div>
                    </button>
                </div>
            </div>
            
            <div class="chat-container">
                <div class="chat-box" id="chatBox">
                    <div class="message system">
                        <div class="message-header">
                            <span class="player-name">系统</span>
                            <span class="message-time" id="currentTime"></span>
                        </div>
                        <div class="message-text">欢迎来到图形化 MUD 游戏原型！请输入昵称并点击"加入游戏"开始冒险。</div>
                    </div>
                </div>
                
                <div class="controls">
                    <input type="text" id="messageInput" placeholder="输入聊天消息..." disabled>
                    <button id="sendButton" disabled>发送</button>
                </div>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="player-info">
                <div class="player-color" id="playerColor"></div>
                <span id="playerStatus">未连接</span>
            </div>
            
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="connectionStatus">断开连接</span>
            </div>
            
            <div id="playerCount">在线玩家: 0</div>
        </div>
        
        <div class="instructions">
            <h3>🎯 游戏说明</h3>
            <ul>
                <li>输入昵称并点击"加入游戏"连接到服务器</li>
                <li>使用方向按钮移动你的角色（彩色圆形）</li>
                <li>在聊天框中与其他玩家交流</li>
                <li>地图中的绿色方块是草地，蓝色方块是水域</li>
                <li>不同颜色的圆形代表其他在线玩家</li>
                <li>系统消息会显示玩家加入/离开信息</li>
            </ul>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
