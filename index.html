<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图形化 MUD 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #4cc9f0;
        }
        
        .game-area {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        #gameCanvas {
            border: 2px solid #4cc9f0;
            background: #0d1b2a;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chat-box {
            height: 400px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 10px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }
        
        .player-name {
            color: #4cc9f0;
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }
        
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        
        input {
            flex: 1;
            background: #222;
            color: white;
        }
        
        button {
            background: #4cc9f0;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:disabled {
            background: #666;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: red;
        }
        
        .status-dot.connected {
            background: #4cc9f0;
        }
        
        .move-btn {
            width: 50px;
            height: 50px;
            font-size: 18px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 MUD 图形化联机游戏</h1>
        </header>

        <div class="game-area">
            <canvas id="gameCanvas" width="800" height="600"></canvas>

            <div class="chat-container">
                <div class="chat-box" id="chatBox"></div>

                <div class="controls">
                    <input id="playerName" placeholder="输入昵称" value="测试玩家">
                    <button id="joinButton">加入游戏</button>
                </div>

                <div class="controls">
                    <input id="messageInput" disabled placeholder="输入消息">
                    <button id="sendButton" disabled>发送</button>
                </div>

                <div>
                    <button class="move-btn" data-dx="0" data-dy="-10">↑</button>
                    <button class="move-btn" data-dx="-10" data-dy="0">←</button>
                    <button class="move-btn" data-dx="10" data-dy="0">→</button>
                    <button class="move-btn" data-dx="0" data-dy="10">↓</button>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div>
                <span id="playerStatus">未连接</span>
            </div>
            <div>
                <div class="status-dot" id="statusDot"></div>
                <span id="connectionStatus">未连接</span>
            </div>
            <div id="playerCount">在线：0</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
