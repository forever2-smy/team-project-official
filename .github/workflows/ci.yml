name: Sprint 3 - CI 自动化构建与测试

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装项目依赖
        run: npm install --no-lockfile

      - name: 执行 TDD 单元测试
        run: npm test

      - name: 构建成功
        run: echo "✅ Green Build 达成！Sprint 3 任务完成"
