<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px; border: none; border-radius: 5px; }
        input { background: rgba(255,255,255,0.1); color: white; width: 200px; }
        button { background: #4361ee; color: white; cursor: pointer; }
        button:hover { background: #3a0ca3; }
        #log {
            background: #000;
            padding: 10px;
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>简单测试页面</h1>
        <div>
            <input type="text" id="playerName" placeholder="输入昵称" value="测试玩家">
            <button id="joinButton">加入游戏</button>
        </div>
        <div id="log"></div>
    </div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 直接包含 MockGameClient 代码
        class MockGameClient {
            constructor(options = {}) {
                this.mockServer = options.mockServer || null;
                this.autoRespond = options.autoRespond !== false;
                this.responseDelay = options.responseDelay || 100;
                this.gameState = {
                    players: {},
                    map: { width: 800, height: 600, tiles: [] },
                    messages: []
                };
                this.playerId = null;
                this.eventHandlers = {};
                this.connected = false;
            }

            connect(url = 'ws://localhost:3001') {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        this.playerId = 'mock-' + Math.random().toString(36).substr(2, 9);
                        this.connected = true;
                        this.trigger('connect');
                        if (this.autoRespond) {
                            this.mockServer = this.createMockServer();
                        }
                        resolve();
                    }, this.responseDelay);
                });
            }

            createMockServer() {
                if (!this.mockServer) {
                    this.mockServer = {
                        players: {},
                        map: { width: 800, height: 600, tiles: [] },
                        messages: []
                    };
                    this.generateMap();
                }
                return this.mockServer;
            }

            generateMap() {
                this.mockServer.tiles = [];
                for (let y = 0; y < 15; y++) {
                    for (let x = 0; x < 20; x++) {
                        const isWater = (x === 5 && y < 10) || (x === 12 && y > 5);
                        this.mockServer.tiles.push({
                            x: x * 40,
                            y: y * 40,
                            type: isWater ? 'water' : 'grass',
                            walkable: !isWater
                        });
                    }
                }
            }

            emit(event, data) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        this.handleEvent(event, data);
                        resolve();
                    }, this.getDelay(event));
                });
            }

            getDelay(event) {
                const delays = {
                    'player-join': 100,
                    'player-move': 50,
                    'send-message': 30
                };
                return delays[event] || 50;
            }

            handleEvent(event, data) {
                switch(event) {
                    case 'player-join':
                        this.handlePlayerJoin(data);
                        break;
                    case 'player-move':
                        this.handlePlayerMove(data);
                        break;
                    case 'send-message':
                        this.handleSendMessage(data);
                        break;
                }
            }

            handlePlayerJoin(data) {
                if (!data.name || data.name.length < 1 || data.name.length > 20) {
                    this.trigger('connect_error', { code: 400, message: '昵称长度必须在1-20字符之间' });
                    return;
                }

                const player = {
                    id: this.playerId,
                    name: data.name,
                    x: Math.floor(Math.random() * 700) + 50,
                    y: Math.floor(Math.random() * 500) + 50,
                    color: `hsl(${Math.floor(Math.random() * 360)}, 70%, 60%)`,
                    lastUpdate: Date.now()
                };

                this.mockServer.players[this.playerId] = player;
                this.trigger('game-state', {
                    players: this.mockServer.players,
                    map: { width: 800, height: 600, tiles: this.mockServer.tiles },
                    messages: this.mockServer.messages.slice(-10)
                });
                this.trigger('player-joined', player);
            }

            handlePlayerMove(data) {
                const player = this.mockServer.players[this.playerId];
                if (!player) return;

                if (data.dx < -50 || data.dx > 50 || data.dy < -50 || data.dy > 50) {
                    return;
                }

                const newX = player.x + data.dx;
                const newY = player.y + data.dy;

                if (newX < 0 || newX > 770 || newY < 0 || newY > 570) {
                    return;
                }

                player.x = newX;
                player.y = newY;
                this.trigger('player-moved', { id: this.playerId, x: newX, y: newY });
            }

            handleSendMessage(data) {
                const player = this.mockServer.players[this.playerId];
                if (!player) return;

                if (!data.text || data.text.length < 1 || data.text.length > 200) {
                    return;
                }

                const msg = {
                    id: Date.now(),
                    player: player.name,
                    text: data.text,
                    timestamp: new Date().toLocaleTimeString(),
                    type: 'chat'
                };

                this.mockServer.messages.push(msg);
                if (this.mockServer.messages.length > 10) {
                    this.mockServer.messages = this.mockServer.messages.slice(-10);
                }
                this.trigger('new-message', msg);
            }

            on(event, handler) {
                if (!this.eventHandlers[event]) {
                    this.eventHandlers[event] = [];
                }
                this.eventHandlers[event].push(handler);
            }

            off(event, handler) {
                if (this.eventHandlers[event]) {
                    this.eventHandlers[event] = this.eventHandlers[event].filter(h => h !== handler);
                }
            }

            trigger(event, data) {
                if (this.eventHandlers[event]) {
                    this.eventHandlers[event].forEach(handler => handler(data));
                }
            }

            disconnect() {
                this.connected = false;
                if (this.mockServer && this.mockServer.players[this.playerId]) {
                    delete this.mockServer.players[this.playerId];
                    this.trigger('player-left', this.playerId);
                }
                this.trigger('disconnect');
            }

            getGameState() {
                return this.gameState;
            }
        }

        // 测试基本的事件绑定
        document.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成');

            const joinButton = document.getElementById('joinButton');
            const playerNameInput = document.getElementById('playerName');

            log('获取到按钮和输入框元素');

            joinButton.addEventListener('click', function() {
                log('按钮被点击了！');

                const name = playerNameInput.value.trim();
                log(`输入的昵称: "${name}"`);

                if (!name) {
                    log('错误: 昵称为空');
                    alert('请输入昵称！');
                    return;
                }

                log(`尝试加入游戏，昵称: ${name}`);

                try {
                    const mockClient = new MockGameClient({ autoRespond: true });
                    log('MockGameClient 实例创建成功');

                    mockClient.on('connect', () => {
                        log('连接成功');
                    });

                    mockClient.on('connect_error', (err) => {
                        log(`连接错误: ${err.message}`);
                        alert(`连接错误: ${err.message}`);
                    });

                    mockClient.on('game-state', (state) => {
                        log(`收到游戏状态: ${Object.keys(state.players).length} 玩家`);
                    });

                    mockClient.on('player-joined', (player) => {
                        log(`玩家加入: ${player.name}`);
                        alert(`欢迎 ${player.name} 加入游戏！`);
                    });

                    log('开始连接...');
                    mockClient.connect().then(() => {
                        log('连接完成，发送加入请求');
                        return mockClient.emit('player-join', { name });
                    }).then(() => {
                        log('加入游戏成功！');
                    }).catch((error) => {
                        log(`错误: ${error.message}`);
                        alert(`错误: ${error.message}`);
                    });

                } catch (error) {
                    log(`创建 MockGameClient 失败: ${error.message}`);
                    alert(`创建失败: ${error.message}`);
                }
            });

            log('事件监听器已绑定');
        });
    </script>
</body>
</html>
